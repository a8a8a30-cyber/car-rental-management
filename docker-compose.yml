version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: car-rental-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: car_rental_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - car-rental-network

  backend:
    build: ./backend
    container_name: car-rental-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/car_rental_db
      NODE_ENV: development
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - car-rental-network
    command: sh -c "sleep 10 && npx prisma migrate deploy && npx prisma generate && npm run dev"

  frontend:
    build: ./frontend
    container_name: car-rental-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - car-rental-network

volumes:
  postgres_data:

networks:
  car-rental-network:
    driver: bridge
